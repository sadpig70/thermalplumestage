    <rect x="58" y="-82" width="36" height="38" fill="#4d6b6e"/>
    <rect x="142" y="-82" width="36" height="38" fill="#4d6b6e"/>
    <text x="26" y="47" fill="#e8fbf8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Geothermal Outfall</text>
  </g>
  <g opacity="0.95">
    <path d="M328 526 C450 430 603 384 805 372 C930 364 1034 384 1134 430 C960 414 806 428 656 474 C530 512 424 546 328 526 Z" fill="url(#plume)" filter="url(#soft)"/>
    <path d="M328 526 C450 430 603 384 805 372 C930 364 1034 384 1134 430" fill="none" stroke="#ffd08a" stroke-width="4" stroke-opacity="0.85"/>
    <path d="M330 552 C500 503 660 472 828 478 C958 482 1052 510 1134 552" fill="none" stroke="#f7f1d2" stroke-width="3" stroke-dasharray="12 12" stroke-opacity="0.55"/>
  </g>
  <g transform="translate(700 86)">
    <rect x="0" y="0" width="380" height="184" rx="10" fill="#0b2530" stroke="#7ad7ce" stroke-opacity="0.55"/>
    <text x="28" y="48" fill="#f3fffb" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Valve Timing</text>
    <text x="28" y="86" fill="#bfe7e0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Reduce flow when boundary delta rises</text>
    <g transform="translate(30 112)">
      <rect x="0" y="0" width="310" height="16" rx="8" fill="#173d48"/>
      <rect x="0" y="0" width="212" height="16" rx="8" fill="#f0b24a"/>
