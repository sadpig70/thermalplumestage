<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ThermalPlume Stage infographic</title>
  <desc id="desc">Marine thermal-discharge valve timing and plume dilution planning.</desc>
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12394c"/>
      <stop offset="0.52" stop-color="#0d5d73"/>
      <stop offset="1" stop-color="#167a79"/>
    </linearGradient>
    <linearGradient id="plume" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d" stop-opacity="0.95"/>
      <stop offset="0.48" stop-color="#ff7f50" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#f7f1d2" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#071821"/>
  <rect x="36" y="36" width="1128" height="648" rx="18" fill="url(#sea)" stroke="#79d6df" stroke-opacity="0.32"/>
  <path d="M36 488 C170 438 264 520 392 470 C520 420 602 490 738 438 C884 382 1010 435 1164 390 L1164 684 L36 684 Z" fill="#062633" opacity="0.72"/>
  <path d="M90 178 C210 132 310 182 426 150 C550 116 675 173 798 139 C918 106 1034 143 1120 110" fill="none" stroke="#bdebf0" stroke-opacity="0.26" stroke-width="5"/>
  <path d="M92 222 C225 176 324 230 446 197 C565 165 690 214 812 184 C934 154 1030 187 1124 156" fill="none" stroke="#bdebf0" stroke-opacity="0.18" stroke-width="4"/>
