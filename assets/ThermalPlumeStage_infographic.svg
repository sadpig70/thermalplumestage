    <text x="24" y="23" fill="#dffaf6" font-family="Segoe UI, Arial, sans-serif" font-size="18">Inputs: discharge specs + current forecast + ecology thresholds -> output: valve timing + dilution radius + halt/mitigate/stage report</text>
